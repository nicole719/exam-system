    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: exam-online-jwt-secret-key-2026-very-long-and-secure
  expiration: 604800000
  header: Authorization
  prefix: "Bearer "

exam:
  answer-cache-prefix: "exam:answer:"
  answer-cache-ttl: 7200
  paper-cache-prefix: "exam:paper:"
  paper-cache-ttl: 3600
